<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center px-3">
    <div class="login-card">
        <h3 class="text-center mb-4 text-primary fw-bold">Mevalar Ombori</h3>
        
        <% if (error) { %>
            <div class="alert alert-danger text-center py-2" role="alert"><%= error %></div>
        <% } %>

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Login</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autocomplete="off">
            </div>
            <div class="mb-3">
                <label class="form-label">Parol</label>
                <input type="password" name="password" class="form-control" placeholder="•••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Kirish</button>
        </form>
    </div>
</div>

</body>
</html>
